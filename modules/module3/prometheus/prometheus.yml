global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: local
    platform: idp

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: demo-app
    static_configs:
      - targets: ["demo-app:8082"]
    metrics_path: /metrics

  # Traefik exposes metrics on the API port (:8080), not :8082
  - job_name: traefik
    static_configs:
      - targets: ["traefik:8080"]
    metrics_path: /metrics
